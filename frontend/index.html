<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu RPG Vanilla JS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: radial-gradient(circle at top, #34495e, #1a252f, #0d1117);
        color: white;
        padding-top: 2rem;
        min-height: 100vh;
      }

      .card {
        background-color: rgba(44, 62, 80, 0.85);
        color: white;
        border: 2px solid #5d6d7e;
        border-radius: 12px;
        backdrop-filter: blur(5px);
      }

      .btn {
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3) !important;
      }

      #battle-log {
        height: 220px;
        overflow-y: auto;
        background-color: rgba(13, 17, 23, 0.9);
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #5d6d7e;
        font-family: "Courier New", Courier, monospace;
        font-size: 0.95rem;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
      }

      .progress {
        height: 20px;
        background-color: #212f3c;
        border: 1px solid #000;
      }

      .mini-card {
        background-color: rgba(22, 33, 46, 0.9);
        border: 2px solid #5d6d7e;
        border-radius: 8 px;
        padding: 10px;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .mini-card.active-turn {
        border-color: #f1c40f !important;
        box-shadow: 0 0 15px rgba(241, 196, 15, 0.5) !important;
        transform: scale(1.02);
      }

      .mini-card .progress {
        height: 12px;
        background-color: #111;
      }

      .mini-card p {
        margin-bottom: 2px;
        font-size: 0.9rem;
      }

      /* ========================================= */
      /* ANIMAÇÕES DE COMBATE                      */
      /* ========================================= */

      /* Barra de Vida */
      .mini-card .progress-bar {
        transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      }

      /* Tremor ao Tomar Dano */
      @keyframes shake {
        0% {
          transform: translateX(0);
          border-color: #e74c3c;
        }
        25% {
          transform: translateX(-5px) rotate(-1deg);
        }
        50% {
          transform: translateX(5px) rotate(1deg);
        }
        75% {
          transform: translateX(-5px) rotate(-1deg);
        }
        100% {
          transform: translateX(0);
          border-color: #5d6d7e;
        }
      }
      .anim-damage {
        animation: shake 0.4s ease-in-out;
        border-color: #e74c3c !important;
      }

      /* Ataque */
      @keyframes attackRight {
        0% {
          transform: translateX(0);
        }
        50% {
          transform: translateX(25px) scale(1.05);
          z-index: 10;
          border-color: #f1c40f;
        }
        100% {
          transform: translateX(0);
        }
      }
      @keyframes attackLeft {
        0% {
          transform: translateX(0);
        }
        50% {
          transform: translateX(-25px) scale(1.05);
          z-index: 10;
          border-color: #f1c40f;
        }
        100% {
          transform: translateX(0);
        }
      }
      .anim-attack-hero {
        animation: attackRight 0.3s ease-in-out;
      }
      .anim-attack-enemy {
        animation: attackLeft 0.3s ease-in-out;
      }

      /* Morte */
      @keyframes deathAnim {
        0% {
          opacity: 1;
          transform: scale(1);
          filter: brightness(1) invert(0);
        }
        40% {
          transform: scale(1.1);
          filter: brightness(2) invert(1);
          border-color: #fff;
        }
        100% {
          opacity: 0.5;
          transform: scale(0.9) translateY(10px);
          filter: grayscale(100%);
        }
      }
      .anim-death {
        animation: deathAnim 0.7s ease-out forwards;
      }

      /* Usando Habilidade */
      @keyframes skillAnim {
        0% {
          transform: translateY(0);
          box-shadow: 0 0 0 rgba(52, 152, 219, 0);
        }
        50% {
          transform: translateY(-15px);
          box-shadow: 0 0 25px rgba(52, 152, 219, 1);
          border-color: #3498db;
        }
        100% {
          transform: translateY(0);
          box-shadow: 0 0 0 rgba(52, 152, 219, 0);
        }
      }
      .anim-skill-use {
        animation: skillAnim 0.6s ease-in-out;
        z-index: 10;
      }

      /* Cura */
      @keyframes healAnim {
        0% {
          box-shadow: 0 0 0 rgba(46, 204, 113, 0);
        }
        50% {
          box-shadow: 0 0 20px rgba(46, 204, 113, 1);
          border-color: #2ecc71;
          transform: scale(1.05);
        }
        100% {
          box-shadow: 0 0 0 rgba(46, 204, 113, 0);
        }
      }
      .anim-heal {
        animation: healAnim 0.5s ease-in-out;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="screen-login" class="row justify-content-center mt-5">
        <div class="col-md-5">
          <div class="card p-4 shadow-lg text-center">
            <h2 class="text-warning mb-4">Bem-vindo ao RPG</h2>

            <input
              type="text"
              id="input-username"
              class="form-control mb-3"
              placeholder="Nome de Usuário"
            />
            <input
              type="password"
              id="input-password"
              class="form-control mb-3"
              placeholder="Senha"
            />

            <div class="d-grid gap-2">
              <button id="btn-login" class="btn btn-primary fw-bold">
                Entrar
              </button>
              <button id="btn-register" class="btn btn-outline-success fw-bold">
                Criar Nova Conta
              </button>
            </div>

            <p id="login-msg" class="mt-3 mb-0 fw-bold"></p>
          </div>
        </div>
      </div>

      <div id="screen-tavern" class="row d-none mt-5 text-center">
        <div class="col-12">
          <h2 class="text-info mb-4">Taverna: Monte seu Time</h2>
          <p>Escolha 3 heróis para a sua jornada.</p>

          <div
            id="character-roster"
            class="row justify-content-center mb-4"
          ></div>

          <button
            id="btn-start-adventure"
            class="btn btn-warning btn-lg fw-bold shadow mt-3"
            disabled
          >
            Selecione 3 Heróis (0/3)
          </button>
        </div>
      </div>

      <div id="screen-map" class="d-none mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="text-warning text-shadow m-0">Mapa Mundi</h2>
          <div
            class="badge bg-warning text-dark fs-5 shadow-sm border border-dark"
          >
            Ouro: <span id="map-gold-counter">0</span>
          </div>
        </div>

        <p class="text-light text-center mb-4">
          Selecione uma região para explorar. Regiões perigosas exigem que você
          limpe as anteriores.
        </p>

        <div
          id="world-maps-container"
          class="row justify-content-center gap-3"
        ></div>
      </div>

      <div id="screen-battle" class="d-none">
        <div
          class="d-flex justify-content-between align-items-center mb-4 border-bottom border-secondary pb-2"
        >
          <div>
            <h2 class="text-warning text-shadow m-0" id="dungeon-name">
              Caverna dos Goblins
            </h2>
            <span class="badge bg-secondary fs-6 mt-1" id="dungeon-room"
              >Sala 1 / 3</span
            >
          </div>
          <div
            class="badge bg-warning text-dark fs-5 shadow-sm border border-dark"
          >
            Ouro: <span id="gold-counter">0</span>
          </div>
        </div>

        <div class="row mb-4">
          <div class="col-md-4">
            <h4 class="text-info text-center mb-3">Seu Grupo</h4>
            <div
              id="hero-team-container"
              class="d-flex flex-column gap-3"
            ></div>
          </div>

          <div class="col-md-4 d-flex flex-column">
            <div class="text-center mb-3">
              <h2
                class="text-danger fw-bold"
                style="text-shadow: 2px 2px 4px #000"
              >
                VS
              </h2>
              <span
                id="turn-indicator"
                class="badge bg-light text-dark fs-6 mb-2"
                >Preparando batalha...</span
              >
            </div>

            <div
              class="card p-3 shadow text-center mb-3 border-secondary"
              style="background-color: rgba(44, 62, 80, 0.9)"
            >
              <h5 class="text-light mb-3">Ações</h5>
              <div class="d-grid gap-2">
                <button
                  id="btn-attack"
                  class="btn btn-danger fw-bold shadow border-dark"
                  disabled
                >
                  ATACAR
                </button>
                <button
                  id="btn-skill"
                  class="btn btn-primary fw-bold shadow border-dark"
                  disabled
                >
                  HABILIDADE
                </button>
                <button
                  id="btn-potion"
                  class="btn btn-success fw-bold shadow border-dark"
                  disabled
                >
                  USAR POÇÃO
                </button>
              </div>
            </div>

            <div
              id="battle-log"
              class="flex-grow-1"
              style="min-height: 200px"
            ></div>
          </div>

          <div class="col-md-4">
            <h4 class="text-danger text-center mb-3">Inimigos</h4>
            <div
              id="enemy-team-container"
              class="d-flex flex-column gap-3"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
